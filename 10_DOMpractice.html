<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" placeholder="Enter name:" class="InPut"
     onkeydown="if(event.key==='Enter'){displayName()}">
    
     <button onclick="displayName()">Submit</button>
    
     <p class="ShowMsg"> </p>

<script>
    function displayName(){
    const name=document.querySelector('.InPut');
    document.querySelector('.ShowMsg').innerHTML=`Your name is " ${name.value} ".`
    }
</script>
</body>
</html>
