<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Game</title>
</head>
<body>

<h3>Coin Flip Game</h3>

<p>Guess the outcome before flipping the coin.</p>

<p>
    <button onclick="Guess='Heads'; alert('Guess taken:Heads');">Heads</button>

    <button onclick="Guess='Tails';alert('Guess taken:Tails')">Tails</button>
</p>

<button onclick="flip()">Flip Coin</button>

<script>

let Guess = '';

function flip() {

    if (Guess === '') {
        alert('Please choose Heads or Tails first.');
        return;
    }

    let random = Math.random();

    let Outcome = '';

    if (random < 0.5) {
        Outcome = 'Heads';
    }
    else {
        Outcome = 'Tails';
    }

    let result = '';

    if (Outcome === Guess) {
        result = 'You Won 🎉';
    }
    else {
        result = 'You Lost ❌';
    }

    console.log(
        `You chose: ${Guess}
Coin landed on: ${Outcome}
Result: ${result}`
    );

    alert(
        `You chose: ${Guess}
Coin landed on: ${Outcome}
Result: ${result}`
    );
}

</script>

</body>
</html>
