<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Rock ,Paper ,Scissor Game</title>
</head>
<body>
    <h3>Rock Paper Scissors Game</h3>
    <p>Choose your move and see if you can beat the computer!</p>
    
    <button onclick="playermove('rock')"> 
        Rock
    </button>

    <button onclick="playermove('paper') "> 
        Paper
    </button>

    <button onclick="playermove('scissor')"> 
        Scissor
    </button>
    
    <button onclick="score.wins=0 , score.losses=0 , score.ties=0 ;alert('Score =0')">
        Reset Score
    </button>
   <script>
    const score={
        wins:0,
        losses: 0,
        ties : 0,
    };
    function computerMove(){
    //Computer Random Selection 
    let ComputerSelect='';
    let RandomNum=Math.random() ; 
    if (RandomNum>=0 && RandomNum<1/3)
    ComputerSelect='rock';
    else if (RandomNum>=1/3 && RandomNum<2/3)
    ComputerSelect='paper';
    else if(RandomNum>=2/3 && RandomNum<1)
    ComputerSelect='scissor';
    return ComputerSelect;
    }

    function playermove(picked){
    let ComputerSelect= computerMove();
    let result='';
    if(picked=='rock'){
    if (ComputerSelect==='rock')
    result='Tie';
    else if (ComputerSelect==='paper')
    result='You loss';
    else 
    result='You win';
     }
    
    else if(picked=='paper'){
    if (ComputerSelect==='rock')
    result='You win';
    else if (ComputerSelect==='paper')
    result='Tie';
    else 
    result='You loss';
    }
    
    else{
    if (ComputerSelect==='rock')
    result='You loss';
    else if (ComputerSelect==='paper')
    result='You win';
    else 
    result='Tie';
    }
  
    if (result==='You win'){
        score.wins+=1;
    }
    else if (result==='You loss'){
        score.losses+=1;
    }
    else if (result==='Tie'){
        score.ties+=1;
    }

   console.log(`You picked ${picked} , Computer picked ${ComputerSelect} ----${result}`)
   alert(`You picked ${picked} , Computer picked ${ComputerSelect} ----${result}\n wins: ${score.wins} Losses: ${score.losses} Ties: ${score.ties}`)

    }
   </script> 
</body>
</html>
