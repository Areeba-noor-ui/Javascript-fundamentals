<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
</head>
<body>
    <input type="text" placeholder="Enter task" class="inputTask">

    <input type="date" class="taskDate">

    <button onclick="addToDo()">Add</button>

    <button onclick="clearList()">clear List</button>
    
    <div class="display"></div>
    
    <script>
        let taskObject=JSON.parse (localStorage.getItem('List'))||[];
       
        displayTasks();

        function addToDo(){
            let task=document.querySelector('.inputTask').value
            let inputDate=document.querySelector('.taskDate').value

            if (task.trim()===""){
                alert("Please Enter a task");
                return;
            }
            taskObject.push({task,inputDate});
            alert(`Task added ${task}`);
            localStorage.setItem('List',JSON.stringify(taskObject));
            document.querySelector('.inputTask').value = '';
            document.querySelector('.taskDate').value = '';
            displayTasks()
        }

        function displayTasks(){
            let html='';
            for (let i=0; i<taskObject.length;i++){
                html += `
                    <div>
                         <strong>${taskObject[i].task}</strong>
                       <span>${taskObject[i].inputDate}</span>
                         <button onclick="deleteTask(${i})"> Delete </button>
                    </div>
                    `;
            }
            document.querySelector('.display').innerHTML=html;

        }
        function deleteTask(index){
                taskObject.splice(index,1);
                localStorage.setItem('List', JSON.stringify(taskObject));
                displayTasks();
                         
        }
        
        function clearList(){
            taskObject=[];
            localStorage.setItem('List', JSON.stringify(taskObject))
           displayTasks();
        }

        

    </script>
</body>
</html>
